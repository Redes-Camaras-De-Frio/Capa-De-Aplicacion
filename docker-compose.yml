services:
  api:
    build: .
    container_name: cadena_frio_api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: cadena_frio
      DB_USER: postgres
      DB_PASSWORD: postgres
      API_PORT: "3000"
      JWT_SECRET: monitoreo_cf_secret_key_dev_2026
      JWT_EXPIRES_IN: 8h
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cadena_frio_net

networks:
  cadena_frio_net:
    driver: bridge
